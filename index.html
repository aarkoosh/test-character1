<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;}
canvas{display:block;width:100%;height:100%;}
canvas.grab{cursor:grab;}
canvas.grabbing{cursor:grabbing;}
#status{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:#111;color:#888;font:14px/1.5 system-ui,sans-serif;
  pointer-events:none;transition:opacity .3s;
}
#status.hidden{opacity:0;}
#status.error{color:#f66;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="status">Loading model…</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const MODEL_URL = './cac-1783899437043.glb';
const EXCLUDED_CLIP = 'T-Pose (No Animation)';
const CROSSFADE_DURATION = 0.25;

const canvas = document.getElementById('c');
const statusEl = document.getElementById('status');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 4);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 1.5;
controls.maxDistance = 15;
controls.maxPolarAngle = Math.PI * 0.48;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: null,
  RIGHT: null,
};

canvas.classList.add('grab');
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button === 0) {
    canvas.classList.remove('grab');
    canvas.classList.add('grabbing');
  }
});
window.addEventListener('pointerup', () => {
  canvas.classList.remove('grabbing');
  canvas.classList.add('grab');
});

scene.add(new THREE.AmbientLight(0xffffff, 0.45));

const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(4, 8, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8899bb, 0.35);
fill.position.set(-3, 4, -2);
scene.add(fill);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(20, 20, 0x555555, 0x333333);
scene.add(grid);

const clock = new THREE.Clock();
let mixer = null;
let clips = [];
let clipIndex = 0;
let currentAction = null;

function setStatus(text, isError = false) {
  statusEl.textContent = text;
  statusEl.classList.toggle('error', isError);
  statusEl.classList.toggle('hidden', !text);
}

function frameModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  model.position.x -= center.x;
  model.position.z -= center.z;
  model.position.y -= box.min.y;

  const height = size.y;
  const targetY = height * 0.4;
  controls.target.set(0, targetY, 0);
  camera.position.set(0, targetY + height * 0.15, height * 2);
  controls.minDistance = height * 0.8;
  controls.maxDistance = height * 6;
  controls.update();
}

function playClip(index) {
  if (!mixer || !clips.length) return;

  const nextAction = mixer.clipAction(clips[index]);
  nextAction.reset().setEffectiveTimeScale(1).setEffectiveWeight(1).play();

  if (currentAction && currentAction !== nextAction) {
    currentAction.crossFadeTo(nextAction, CROSSFADE_DURATION, false);
  }

  currentAction = nextAction;
  clipIndex = index;
}

function nextAnimation() {
  if (!clips.length) return;
  playClip((clipIndex + 1) % clips.length);
}

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    nextAnimation();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

new GLTFLoader().load(
  MODEL_URL,
  (gltf) => {
    const model = gltf.scene;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    scene.add(model);
    frameModel(model);

    clips = gltf.animations.filter((clip) => clip.name !== EXCLUDED_CLIP);
    if (clips.length) {
      mixer = new THREE.AnimationMixer(model);
      const idealIndex = clips.findIndex((c) => c.name === 'Ideal');
      playClip(idealIndex >= 0 ? idealIndex : 0);
    }

    setStatus('');
  },
  (progress) => {
    if (progress.total) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      setStatus(`Loading model… ${pct}%`);
    }
  },
  (err) => {
    console.error(err);
    setStatus('Failed to load model. Serve this folder over HTTP.', true);
  }
);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  controls.update();
  renderer.render(scene, camera);
}

renderer.setSize(innerWidth, innerHeight);
animate();
</script>
</body>
</html>
